<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hitthousehold — Coming Soon</title>
  <style>
    :root{--bg:#0f172a;--card:#0b1220;--accent:#06b6d4;--muted:#94a3b8}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,var(--bg),#071029);color:#e6eef8}
    .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:2rem}
    .card{max-width:720px;width:100%;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:12px;padding:3rem 2.5rem;box-shadow:0 8px 30px rgba(2,6,23,0.6);text-align:center}
    h1{font-size:clamp(1.5rem,4vw,2.25rem);margin:0 0 0.5rem}
    p.lead{margin:0 0 1.25rem;color:var(--muted);font-size:1.05rem}
    .notice{display:inline-block;margin-top:1rem;padding:0.5rem 0.9rem;border-radius:999px;background:rgba(6,182,212,0.12);color:var(--accent);font-weight:600}
    footer{margin-top:1.5rem;color:var(--muted);font-size:0.9rem}
    @media (prefers-reduced-motion: no-preference){
      .gear{animation:spin 6s linear infinite}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    }
    .gear{width:48px;height:48px;margin:0 auto 1rem;display:block;opacity:0.95}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <!-- simple decorative SVG gear -->
      <svg class="gear" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" stroke="currentColor" stroke-opacity="0.9" stroke-width="0.8"/>
        <path d="M19.4 12.9c.03-.3.03-.6 0-.9l1.9-1.5a0.5 0.5 0 00.1-.7l-1.8-3.1a0.5 0.5 0 00-.7-.18l-2.2 1a7.6 7.6 0 00-1.6-.9l-.34-2.3a0.5 0.5 0 00-.5-.42h-3.6a0.5 0.5 0 00-.5.42l-.34 2.3c-.56.22-1.1.5-1.6.9l-2.2-1a0.5 0.5 0 00-.7.18L2.6 9.8a0.5 0.5 0 00.1.7l1.9 1.5c-.03.3-.03.6 0 .9L2.7 16.6a0.5 0.5 0 00-.1.7l1.8 3.1c.16.28.46.4.75.28l2.2-1c.5.4 1.1.7 1.6.9l.34 2.3c.05.26.27.42.5.42h3.6c.23 0 .45-.16.5-.42l.34-2.3c.56-.22 1.1-.5 1.6-.9l2.2 1c.29.12.59 0 .75-.28l1.8-3.1a0.5 0.5 0 00-.1-.7l-1.9-1.5z" stroke="currentColor" stroke-opacity="0.7" stroke-width="0.6"/>
      </svg>

      <h1>Welcome to the Hitthousehold.</h1>
      <p class="lead">We are currently under construction and will open shortly.</p>
      <div class="notice">Coming soon</div>
      <footer>
        <!-- optional small note -->
        <small>Thanks for stopping by — check back soon for updates.</small>
      </footer>
    </div>
  </div>
</body>
</html>

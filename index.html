<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starfield</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Cormorant Garamond', serif; color: #fff; cursor: crosshair; }
  canvas { display: block; }

  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px;
    color: rgba(255,255,255,0.25); text-transform: uppercase; pointer-events: none;
    transition: opacity 1.5s ease; z-index: 10;
  }

  #label-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

  .star-label {
    position: absolute; pointer-events: auto; cursor: pointer; text-align: center;
    transition: opacity 0.4s ease, transform 0.3s ease; user-select: none;
  }
  .star-label .name {
    font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 15px;
    letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.7);
    text-shadow: 0 0 20px rgba(255,255,255,0.3); transition: all 0.4s ease;
  }
  .star-label:hover .name {
    color: rgba(255,255,255,1);
    text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 0 80px rgba(200,220,255,0.3);
    letter-spacing: 6px;
  }
  .star-label .line {
    width: 1px; height: 20px; margin: 0 auto 6px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.3));
    transition: height 0.4s ease, background 0.4s ease;
  }
  .star-label:hover .line {
    height: 32px; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.6));
  }

  #intro-veil {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #000; z-index: 100; pointer-events: none; transition: opacity 2s ease;
  }
</style>
</head>
<body>

<div id="intro-veil"></div>
<div id="label-overlay"></div>
<div id="hint">hold ctrl + move mouse to orbit · scroll to zoom · click a star to navigate</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
  const navStars = [
    { name: 'Home',              color: 0xffffff, pos: [0, 8, 0],      size: 2.16, href: null },
    { name: 'Bulldogs Schedule', color: 0x00cccc, pos: [-20, 2, -14],  size: 1.92, href: 'schedule.html' },
    { name: 'About Us',          color: 0xf0d080, pos: [18, -2, -18],  size: 1.80, href: 'about.html' },
    { name: 'Our Journey',       color: 0xa8e6a3, pos: [-8, -10, -26], size: 1.68, href: 'journey.html' },
  ];

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);
  camera.position.set(0, 0, 45);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000005);
  document.body.prepend(renderer.domElement);

  // ── Background stars ──
  const starCount = 6000;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount * 3);
  const starSizes = new Float32Array(starCount);
  const starColors = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const r = 200 + Math.random() * 800;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    starPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    starPos[i*3+2] = r * Math.cos(phi);
    starSizes[i] = 0.5 + Math.random() * 2.5;
    const temp = Math.random();
    if (temp < 0.1) { starColors[i*3]=0.7; starColors[i*3+1]=0.8; starColors[i*3+2]=1.0; }
    else if (temp < 0.15) { starColors[i*3]=1.0; starColors[i*3+1]=0.85; starColors[i*3+2]=0.6; }
    else { const b=0.7+Math.random()*0.3; starColors[i*3]=b; starColors[i*3+1]=b; starColors[i*3+2]=b; }
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
  starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
  starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
  const starMat = new THREE.ShaderMaterial({
    vertexShader: `
      attribute float size; attribute vec3 color; varying vec3 vColor;
      void main() { vColor = color; vec4 mvp = modelViewMatrix * vec4(position,1.0);
        gl_PointSize = size * (300.0 / -mvp.z); gl_Position = projectionMatrix * mvp; }`,
    fragmentShader: `
      varying vec3 vColor;
      void main() { float d = length(gl_PointCoord - 0.5)*2.0;
        float core = smoothstep(0.5,0.0,d); float glow = exp(-d*d*3.0)*0.4;
        gl_FragColor = vec4(vColor, core+glow); }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  scene.add(new THREE.Points(starGeo, starMat));

  // ── Nebula dust ──
  for (let n = 0; n < 5; n++) {
    const cGeo = new THREE.PlaneGeometry(120+Math.random()*100, 120+Math.random()*100);
    const col = new THREE.Color().setHSL(Math.random(), 0.3, 0.08);
    const cMat = new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.03+Math.random()*0.03, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false });
    const cloud = new THREE.Mesh(cGeo, cMat);
    cloud.position.set((Math.random()-0.5)*200,(Math.random()-0.5)*200,-200-Math.random()*300);
    cloud.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    scene.add(cloud);
  }

  // ── Nav star meshes ──
  const navMeshes = [];
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  navStars.forEach((s, idx) => {
    const group = new THREE.Group();
    group.position.set(...s.pos);

    // Core sphere — brighter
    const geo = new THREE.SphereGeometry(s.size * 0.42, 32, 32);
    const mat = new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 1.0 });
    group.add(new THREE.Mesh(geo, mat));

    // Inner hot glow sprite
    const canvas1 = document.createElement('canvas');
    canvas1.width = 256; canvas1.height = 256;
    const ctx1 = canvas1.getContext('2d');
    const grad1 = ctx1.createRadialGradient(128,128,0,128,128,128);
    const c = new THREE.Color(s.color);
    const r = Math.floor(c.r*255), g = Math.floor(c.g*255), b = Math.floor(c.b*255);
    grad1.addColorStop(0,   `rgba(255,255,255,0.9)`);
    grad1.addColorStop(0.1, `rgba(${r},${g},${b},0.8)`);
    grad1.addColorStop(0.35,`rgba(${r},${g},${b},0.3)`);
    grad1.addColorStop(1,   'rgba(0,0,0,0)');
    ctx1.fillStyle = grad1; ctx1.fillRect(0,0,256,256);
    const spriteMat1 = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas1), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    const sprite1 = new THREE.Sprite(spriteMat1);
    sprite1.scale.set(s.size*5, s.size*5, 1);
    group.add(sprite1);

    // Outer wide glow sprite
    const canvas2 = document.createElement('canvas');
    canvas2.width = 256; canvas2.height = 256;
    const ctx2 = canvas2.getContext('2d');
    const grad2 = ctx2.createRadialGradient(128,128,0,128,128,128);
    grad2.addColorStop(0,   `rgba(${r},${g},${b},0.35)`);
    grad2.addColorStop(0.4, `rgba(${r},${g},${b},0.08)`);
    grad2.addColorStop(1,   'rgba(0,0,0,0)');
    ctx2.fillStyle = grad2; ctx2.fillRect(0,0,256,256);
    const spriteMat2 = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas2), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
    const sprite2 = new THREE.Sprite(spriteMat2);
    sprite2.scale.set(s.size*9, s.size*9, 1);
    group.add(sprite2);

    // Orbiting moons / satellites (2 per star)
    const moons = [];
    for (let m = 0; m < 2; m++) {
      const moonGeo = new THREE.SphereGeometry(s.size * 0.08, 16, 16);
      const moonMat = new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 0.4 + m * 0.15 });
      const moon = new THREE.Mesh(moonGeo, moonMat);

      // Small glow on moon
      const mc = document.createElement('canvas');
      mc.width = 64; mc.height = 64;
      const mctx = mc.getContext('2d');
      const mg = mctx.createRadialGradient(32,32,0,32,32,32);
      mg.addColorStop(0, `rgba(${r},${g},${b},0.4)`);
      mg.addColorStop(0.5, `rgba(${r},${g},${b},0.1)`);
      mg.addColorStop(1, 'rgba(0,0,0,0)');
      mctx.fillStyle = mg; mctx.fillRect(0,0,64,64);
      const moonSpriteMat = new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(mc), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
      const moonSprite = new THREE.Sprite(moonSpriteMat);
      moonSprite.scale.set(s.size * 0.6, s.size * 0.6, 1);
      moon.add(moonSprite);

      group.add(moon);
      moons.push({
        mesh: moon,
        radius: s.size * (1.2 + m * 0.7),
        speed: (0.4 + m * 0.25) * (m % 2 === 0 ? 1 : -1),
        tilt: Math.random() * Math.PI * 0.4,
        phase: (Math.PI * 2 / 2) * m + idx * 1.3
      });
    }

    // Hit target
    const hitGeo = new THREE.SphereGeometry(s.size * 1.8, 16, 16);
    const hitMesh = new THREE.Mesh(hitGeo, new THREE.MeshBasicMaterial({ visible: false }));
    hitMesh.userData = s;
    group.add(hitMesh);

    scene.add(group);
    navMeshes.push({ group, hitMesh, sprite: sprite1, sprite2, data: s, baseSpriteScale: s.size * 5, baseSpriteScale2: s.size * 9, moons });
  });

  // ── Camera orbit ──
  let orbiting = false, autoRotate = true;
  let spherical = { theta: 0, phi: Math.PI / 2, radius: 45 };
  let targetSpherical = { ...spherical };
  let prevMouse = { x: 0, y: 0 };

  function updateCamera(s) {
    camera.position.x = s.radius * Math.sin(s.phi) * Math.sin(s.theta);
    camera.position.y = s.radius * Math.cos(s.phi);
    camera.position.z = s.radius * Math.sin(s.phi) * Math.cos(s.theta);
    camera.lookAt(0, 0, -10);
  }

  addEventListener('keydown', e => { if (e.key === 'Control') { orbiting = true; autoRotate = false; } });
  addEventListener('keyup', e => { if (e.key === 'Control') orbiting = false; });
  addEventListener('mousemove', e => {
    mouse.x = (e.clientX / innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    if (orbiting) {
      targetSpherical.theta -= (e.clientX - prevMouse.x) * 0.004;
      targetSpherical.phi = Math.max(0.3, Math.min(Math.PI - 0.3, targetSpherical.phi + (e.clientY - prevMouse.y) * 0.004));
    }
    prevMouse.x = e.clientX; prevMouse.y = e.clientY;
  });
  addEventListener('wheel', e => { targetSpherical.radius = Math.max(15, Math.min(80, targetSpherical.radius + e.deltaY * 0.04)); autoRotate = false; }, { passive: true });

  // ── Click → navigate ──
  addEventListener('click', e => {
    const cm = new THREE.Vector2((e.clientX/innerWidth)*2-1, -(e.clientY/innerHeight)*2+1);
    raycaster.setFromCamera(cm, camera);
    const hits = raycaster.intersectObjects(navMeshes.map(n => n.hitMesh));
    if (hits.length > 0) {
      const data = hits[0].object.userData;
      if (data.href) window.location.href = data.href;
    }
  });

  // ── HTML Labels ──
  const labelContainer = document.getElementById('label-overlay');
  const labelElements = navStars.map(s => {
    const el = document.createElement('div');
    el.className = 'star-label';
    el.innerHTML = `<div class="line"></div><div class="name">${s.name}</div>`;
    el.addEventListener('click', () => { if (s.href) window.location.href = s.href; });
    labelContainer.appendChild(el);
    return { el, data: s };
  });

  function updateLabels() {
    labelElements.forEach(({ el, data }) => {
      const pos = new THREE.Vector3(...data.pos);
      pos.project(camera);
      if (pos.z > 1) { el.style.opacity = '0'; return; }
      const x = (pos.x * 0.5 + 0.5) * innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * innerHeight;
      el.style.left = x + 'px'; el.style.top = (y - 50) + 'px';
      el.style.transform = 'translate(-50%, -100%)';
      const dist = camera.position.distanceTo(new THREE.Vector3(...data.pos));
      el.style.opacity = Math.max(0, Math.min(1, 1 - (dist - 20) / 60));
    });
  }

  // ── Twinkle ──
  const baseSizes = new Float32Array(starSizes);
  function twinkle(time) {
    const sizes = starGeo.attributes.size.array;
    for (let i = 0; i < starCount; i++) {
      if (Math.random() > 0.02) continue;
      sizes[i] = baseSizes[i] * (0.6 + 0.4 * Math.sin(time * 0.003 + i * 1.7));
    }
    starGeo.attributes.size.needsUpdate = true;
  }

  // ── Loop ──
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    if (autoRotate) targetSpherical.theta += 0.0004;
    spherical.theta += (targetSpherical.theta - spherical.theta) * 0.04;
    spherical.phi += (targetSpherical.phi - spherical.phi) * 0.04;
    spherical.radius += (targetSpherical.radius - spherical.radius) * 0.06;
    updateCamera(spherical);
    navMeshes.forEach((n, i) => {
      const pulse = 1 + 0.15 * Math.sin(t * 1.5 + i * 2.1);
      const s1 = n.baseSpriteScale * pulse;
      n.sprite.scale.set(s1, s1, 1);
      const s2 = n.baseSpriteScale2 * (1 + 0.1 * Math.sin(t * 0.8 + i * 3.0));
      n.sprite2.scale.set(s2, s2, 1);

      // Animate orbiting moons
      n.moons.forEach(m => {
        const angle = t * m.speed + m.phase;
        m.mesh.position.x = Math.cos(angle) * m.radius;
        m.mesh.position.y = Math.sin(angle) * m.radius * Math.cos(m.tilt);
        m.mesh.position.z = Math.sin(angle) * m.radius * Math.sin(m.tilt);
      });
    });
    twinkle(t * 1000);
    updateLabels();
    renderer.render(scene, camera);
  }

  addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

  const veil = document.getElementById('intro-veil');
  setTimeout(() => { veil.style.opacity = '0'; setTimeout(() => veil.remove(), 2000); }, 400);
  setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 10000);
  animate();
})();
</script>
</body>
</html>
